name: Stock Info Auto-Run (Weekly)

on:
  schedule:
    # UTC 10:30 = 台灣時間 18:30
    # 最後一個 0 代表「星期日 (Sunday)」
    - cron: '30 10 * * 0'
  
  # 允許我們隨時手動點擊按鈕測試
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # 確保機器人有把 CSV 存回專案的權限
    permissions:
      contents: write

    steps:
      - name: 📥 取得程式碼 (Checkout code)
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.10 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝依賴套件 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 執行基本資料爬蟲 (Run Info Crawler)
        run: python info_crawler.py

      - name: 💾 將 CSV 存回 GitHub (Commit and Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 綁定基本資料的 CSV
          git add tw_stock_info.csv
          
          # 只有當資料有更新時才會 commit，避免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "🏢 自動更新公司基本資料 $(date +'%Y-%m-%d')" && git push)
