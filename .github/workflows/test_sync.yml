name: Route B Write Test

on:
  workflow_dispatch: # 🌟 允許我們手動在網頁介面點擊按鈕測試，不用傻傻等定時排程

jobs:
  run-test-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests pandas lxml urllib3 git+https://github.com/nk7260ynpa/Tw_stock_crawer.git

    - name: Run Test Script
      run: python test_crawler.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add tw_stock_data.csv
        # 避免資料沒變動時 commit 報錯，加入 || exit 0 保護
        git commit -m "Test: Automated push 2026-07-06 data" || exit 0
        git push
