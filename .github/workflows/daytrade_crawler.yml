name: DayTrade Crawler Auto-Run

on:
  schedule:
    # 這裡使用 UTC 時間。10:45 UTC = 台灣時間 18:45。
    # 1-5 代表星期一到星期五執行 (週末不跑)
    - cron: '45 10 * * 1-5'
  
  # 允許我們隨時手動點擊按鈕測試
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # 宣告寫入權限，讓 Actions 有權推送資料回 Repo
    permissions:
      contents: write

    steps:
      - name: 📥 取得程式碼 (Checkout code)
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.10 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝依賴套件 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 執行當沖資料爬蟲 (Run DayTrade Crawler)
        run: python daytrade_crawler.py

      - name: 💾 將 CSV 存回 GitHub (Commit, Pull, and Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. 綁定當沖 CSV 檔
          git add tw_daytrade_data.csv
          
          # 2. 只有在有新交易日更新時才進行 commit
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 自動更新台股個股當沖明細 $(date +'%Y-%m-%d')"
          
          # 3. 【防版本衝突】Push 之前先同步遠端最新修改並重新排列歷史紀錄
          git pull --rebase origin main
          
          # 4. 安全推上雲端
          git push
