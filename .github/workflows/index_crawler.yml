name: Index Crawler Auto-Run

on:
  schedule:
    # 使用 UTC 時間。UTC 10:30 = 台灣時間 18:30
    # 1-5 代表星期一到星期五執行
    - cron: '30 10 * * 1-5'
  
  # 允許我們隨時手動點擊按鈕測試
  workflow_dispatch: 

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # 確保機器人有權限把 CSV 存回你的專案
    permissions:
      contents: write

    steps:
      - name: 📥 取得程式碼 (Checkout code)
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.10 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝依賴套件 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 執行大盤爬蟲 (Run Index Crawler)
        # 這裡只呼叫你的大盤程式
        run: python index_crawler.py

      - name: 💾 將 CSV 存回 GitHub (Commit and Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 這裡只綁定大盤的 CSV
          git add tw_index_data.csv
          
          # 如果資料有變動才 commit，避免沒有更新時報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "📈 自動更新大盤指數 $(date +'%Y-%m-%d')" && git push)
